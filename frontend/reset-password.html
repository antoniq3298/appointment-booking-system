<!doctype html>
<html lang="bg">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset password</title>
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
<header>
    <b data-i18n="resetPassword.title">Reset password</b>
    <nav>
        <a href="/index.html" data-i18n="common.home">Home</a>
        <a href="/login.html" data-i18n="common.login">Login</a>
    </nav>
    <select id="langSwitch" class="lang-switch">
        <option value="en">EN</option>
        <option value="bg">BG</option>
    </select>
</header>

<main>
    <div id="notice" class="notice"></div>

    <div class="card">
        <label data-i18n="resetPassword.newPassword">New password</label>
        <input id="password" type="password" placeholder="****" />

        <button onclick="handleResetPassword()" data-i18n="resetPassword.submit">Reset password</button>
    </div>
</main>

<script src="/js/i18n.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
