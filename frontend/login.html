<!doctype html>
<html lang="bg">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
<header>
    <b data-i18n="login.title">Login</b>
    <nav>
        <a href="/index.html" data-i18n="common.home">Home</a>
        <a href="/register.html" data-i18n="common.register">Register</a>
    </nav>
    <select id="langSwitch" class="lang-switch">
        <option value="en">EN</option>
        <option value="bg">BG</option>
    </select>
</header>

<main>
    <div id="notice" class="notice"></div>

    <div class="card">
        <label data-i18n="common.email">Email</label>
        <input id="email" placeholder="a@b.com" />

        <label data-i18n="common.password">Password</label>
        <input id="password" type="password" placeholder="****" />

        <button onclick="handleLogin()" data-i18n="login.submit">Login</button>
        <a href="/forgot-password.html" data-i18n="login.forgot">Forgot password?</a>
    </div>
</main>

<script src="/js/i18n.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
