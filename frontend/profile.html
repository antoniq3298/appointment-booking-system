<!doctype html>
<html lang="bg">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile</title>
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
<header>
    <b data-i18n="profile.title">Profile</b>
    <nav>
        <a href="/index.html" data-i18n="common.home">Home</a>
        <a href="/booking.html" data-i18n="common.booking">Booking</a>
    </nav>
    <select id="langSwitch" class="lang-switch">
        <option value="en">EN</option>
        <option value="bg">BG</option>
    </select>
    <button id="logout" style="width:auto" data-i18n="common.logout">Logout</button>
</header>

<main class="row">
    <section class="col">
        <div class="card">
            <h3 data-i18n="profile.editTitle">Edit profile</h3>
            <div id="noticeProfile" class="notice"></div>

            <label data-i18n="common.email">Email</label>
            <input id="email" disabled />

            <label data-i18n="common.name">Name</label>
            <input id="name" />

            <label data-i18n="common.phone">Phone</label>
            <input id="phone" placeholder="+359..." />

            <button id="saveProfile" data-i18n="profile.saveChanges">Save changes</button>
        </div>
    </section>

    <section class="col">
        <div class="card">
            <h3 data-i18n="profile.changePasswordTitle">Change password</h3>
            <div id="noticePassword" class="notice"></div>

            <label data-i18n="profile.currentPassword">Current password</label>
            <input id="currentPassword" type="password" />

            <label data-i18n="profile.newPassword">New password</label>
            <input id="newPassword" type="password" />

            <button id="changePassword" data-i18n="profile.changePasswordBtn">Change password</button>
        </div>
    </section>
</main>

<script src="/js/i18n.js"></script>
<script src="/js/api.js"></script>
<script src="/js/profile.js"></script>
</body>
</html>
