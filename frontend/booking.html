<!doctype html>
<html lang="bg">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Booking</title>
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
<header>
    <b data-i18n="common.booking">Booking</b>
    <nav>
        <a href="/index.html" data-i18n="common.home">Home</a>
        <a href="/admin.html" data-i18n="common.admin">Admin</a>
        <a href="/profile.html" data-i18n="common.profile">Profile</a>
    </nav>
    <select id="langSwitch" class="lang-switch">
        <option value="en">EN</option>
        <option value="bg">BG</option>
    </select>
    <button id="logout" style="width:auto" data-i18n="common.logout">Logout</button>
</header>

<main class="row">
    <section class="col">
        <div class="card">
            <h3 data-i18n="booking.reserveTitle">Reserve</h3>
            <div id="notice" class="notice"></div>

            <label data-i18n="common.service">Service</label>
            <select id="service"></select>

            <label data-i18n="common.date">Date</label>
            <input id="date" type="date" />

            <div class="card">
                <div id="selectedSlot">Selected slot: -</div>
                <input id="slotId" type="hidden" />
            </div>

            <label data-i18n="booking.note">Note</label>
            <textarea id="note" rows="3" placeholder="Optional" data-i18n-placeholder="common.optional"></textarea>

            <button id="reserve" data-i18n="booking.reserveBtn">Reserve</button>
        </div>

        <div class="card">
            <h3 data-i18n="booking.availableSlotsTitle">Available slots</h3>
            <div id="slots" class="list"></div>
        </div>
    </section>

    <section class="col">
        <div class="card">
            <h3 data-i18n="booking.myBookingsTitle">My bookings</h3>
            <div id="myBookings" class="list"></div>
        </div>
    </section>
</main>

<script src="/js/i18n.js"></script>
<script src="/js/api.js"></script>
<script src="/js/booking.js"></script>
</body>
</html>
